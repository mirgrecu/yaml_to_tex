work_experience:
  - title: Senior Research Scientist
    company: Morgan State University
    location: Baltimore, MD, 21251
    start_date: May 2011
    end_date: Present
    responsibilities:
      - Directed the development of the NASA GPM Combined Radar-Radiometer Algorithm (CORRA), a physics-based and deep-learning-enhanced retrieval system operationally deployed to provide global precipitation estimates under uncertainty.
      - Formulated and implemented machine learning methodologies to address challenges in radar signal processing, including ground clutter mitigation, attenuation correction, and non-uniform beam flling—improving detection of light precipitation and reducing biases by 50 \%.
      - Applied optimal estimation theory and probabilistic modeling to integrate radar, radiometer, and lidar observations in a physically consistent framework, enabling robust estimates in ill-posed and noisy observational scenarios.
      - Pioneered a non-parametric method to estimate ice particle size distributions from multi-frequency radar observations employing a large empirical database and statistical search techniques.
      - Led the design and execution of cloud-resolving WRF simulations to support satellite algorithm development, enabling the enhancement of physical models with ML.

  - title: Assistant Research Scientist
    company: University of Maryland, Baltimore County
    location: Baltimore, MD, 21250
    start_date: June 2002
    end_date: May 2011
    responsibilities:
      - Formulated and implemented a Markov Chain Monte Carlo (MCMC) framework featuring importance sampling—conceptually similar to Proximal Policy Optimization—to simulate satellite observations and quantify their sensitivity to environmental parameters.
      - Used retrieval outputs to train ML radiometer-only algorithms for precipitation and latent heating estimation, reducing dependency on radar data while preserving accuracy.
      - Generated satellite-based water and energy budget datasets used to evaluate climate model simulations and support weather forecasting applications.

  - title: Visiting Scientist
    company: University of Connecticut
    location: Storrs, CT 06269
    start_date: October 1999 - June 2002
    responsibilities:
      - Designed a methodology to estimate precipitation from X-band polarimetric radar observations.
      - Prototyped a variational retrieval algorithm for the TRMM combined radar–radiometer observations, integrating physical models and statistical optimization.

