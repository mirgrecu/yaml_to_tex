summary:
  AI/ML Research Scientist with 20+ years of experience designing and implementing scalable, uncertainty-aware machine learning and physically informed algorithms for remote sensing and environmental systems. Proven track record in algorithm design, deep learning, synthetic data generation, and decision science. Skilled in deploying AI models in operational settings. Experienced in Python, PyTorch, TensorFlow, C, Fortran, and optimal estimation techniques. 

